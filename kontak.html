<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIXCOFFEE - Kontak</title>
    <!-- SEO Meta Tags -->
    <meta name="description" content="SIXCOFFEE menyajikan pengalaman kopi premium dari biji pilihan petani lokal. Nikmati Espresso Gold, Vanilla Mist, dan Signature Arabica terbaik di Jakarta." />
    <meta name="keywords" content="SIXCOFFEE, kopi jakarta, cafe premium, espresso gold, biji kopi lokal, coffee shop jakarta selatan" />
    <meta name="author" content="SIXCOFFEE Team" />
    <!-- Favicon (SVG Data URI untuk SEO & Performa) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23c49b63'/><text x='50%' y='50%' dominant-baseline='central' text-anchor='middle' font-family='serif' font-size='60' fill='white' font-weight='bold'>6</text></svg>" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      :root {
        --primary: #c49b63;
        --dark: #121212;
        --darker: #0a0a0a;
        --light: #f4f4f4;
        --gray: #888;
        --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      /* Snap Scroll hanya untuk Desktop */
      @media (min-width: 993px) {
        html {
          scroll-snap-type: y mandatory;
        }
      }

      body {
        font-family: "Poppins", sans-serif;
        background-color: var(--dark);
        color: var(--light);
        line-height: 1.6;
        overflow-x: hidden;
      }

      h1,
      h2,
      h3 {
        font-family: "Playfair Display", serif;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
        width: 100%;
      }

      .btn {
        display: inline-block;
        padding: 12px 30px;
        background-color: var(--primary);
        color: white;
        border-radius: 4px;
        font-weight: 600;
        transition: var(--transition);
        border: 2px solid var(--primary);
        cursor: pointer;
        text-decoration: none;
        text-align: center;
      }

      .btn:hover {
        background-color: transparent;
        color: var(--primary);
      }

      /* Section Base */
      section {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        scroll-snap-align: start;
        position: relative;
        padding: 100px 0;
      }

      /* Navbar Section */
      header {
        position: fixed;
        top: 0;
        width: 100%;
        background: rgba(18, 18, 18, 0.85);
        backdrop-filter: blur(10px);
        z-index: 2000;
        padding: 20px 0;
        transition: var(--transition);
      }

      nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        font-family: "Playfair Display", serif;
        font-size: 1.8rem;
        font-weight: bold;
        letter-spacing: 2px;
        color: var(--primary);
        z-index: 2101;
      }

      .nav-links {
        display: flex;
        gap: 30px;
      }

      .nav-links a {
        text-decoration: none;
        color: var(--light);
        transition: var(--transition);
        font-weight: 400;
        opacity: 0.7;
      }

      .nav-links a:hover,
      .nav-links a.active {
        color: var(--primary);
        opacity: 1;
      }

      /* Mobile Menu Toggle */
      .mobile-toggle {
        display: none;
        cursor: pointer;
        color: var(--primary);
        z-index: 2101;
        padding: 5px;
      }

      /* Hero Section (Home) */
      #home {
        background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), url("https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=1950&q=80");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        text-align: center;
      }

      /* About Section (Tentang) */
      #tentang {
        background-color: var(--dark);
      }

      .about-content {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 60px;
        align-items: center;
      }

      .about-img {
        width: 100%;
        height: 450px;
        object-fit: cover;
        border-radius: 8px;
        box-shadow: 20px 20px 0px var(--primary);
        display: block;
      }

      .team-grid {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 15px;
        margin-top: 30px;
      }

      .team-member img {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        border: 2px solid var(--primary);
        margin-bottom: 8px;
        object-fit: cover;
      }

      /* Shop Section */
      #toko {
        background-color: var(--darker);
      }

      .shop-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 25px;
      }

      .product-card {
        background: var(--dark);
        padding: 25px;
        border-radius: 12px;
        text-align: center;
        border: 1px solid rgba(196, 155, 99, 0.1);
      }

      .product-img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: 8px;
        margin-bottom: 15px;
      }

      /* Combined Contact & Footer Section */
      #kontak {
        background-color: var(--dark);
        padding: 100px 0 40px;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
      }

      .contact-wrapper {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 60px;
      }

      .contact-info h2 {
        font-size: 2.5rem;
        color: var(--primary);
        margin-bottom: 30px;
      }

      .info-item {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 25px;
      }

      .contact-form {
        background: var(--darker);
        padding: 40px;
        border-radius: 12px;
        border: 1px solid rgba(196, 155, 99, 0.1);
      }

      .footer-bottom {
        margin-top: 80px;
        padding-top: 40px;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        text-align: center;
      }

      .footer-logo {
        font-family: "Playfair Display", serif;
        font-size: 1.5rem;
        color: var(--primary);
        margin-bottom: 15px;
        display: block;
      }

      .social-links {
        display: flex;
        justify-content: center;
        gap: 25px;
        margin-bottom: 20px;
      }

      .social-links a {
        color: var(--light);
        opacity: 0.7;
        transition: var(--transition);
        display: flex;
        align-items: center;
      }

      .social-links a:hover {
        color: var(--primary);
        opacity: 1;
        transform: translateY(-3px);
      }

      .social-links svg {
        width: 20px;
        height: 20px;
        fill: currentColor;
      }

      /* Mobile Responsive */
      @media (max-width: 992px) {
        section {
          min-height: auto;
          padding: 100px 0;
          display: block;
        }
        .about-content {
          grid-template-columns: 1fr;
          gap: 40px;
        }
        .about-img {
          height: 300px;
          box-shadow: 10px 10px 0px var(--primary);
        }
        .team-grid {
          grid-template-columns: repeat(3, 1fr);
        }

        .mobile-toggle {
          display: block;
        }

        .nav-links {
          position: fixed;
          top: -110%;
          left: 0;
          width: 100%;
          height: 100vh;
          background: var(--darker);
          flex-direction: column;
          justify-content: center;
          align-items: center;
          gap: 40px;
          transition: var(--transition);
          z-index: 2100;
          visibility: hidden;
        }

        .nav-links.active {
          top: 0;
          visibility: visible;
        }

        .nav-links a {
          font-size: 2rem;
          font-family: "Playfair Display", serif;
        }

        .contact-wrapper {
          grid-template-columns: 1fr;
          gap: 40px;
        }

        .contact-form {
          padding: 30px 20px;
        }
      }
    </style>
  </head>
  <body>
    <header id="navbar">
      <div class="container">
        <nav>
          <div class="logo">SIXCOFFEE</div>
          <div class="mobile-toggle" id="mobileBtn">
            <i data-lucide="menu"></i>
          </div>
          <ul class="nav-links" id="navLinks">
            <li><a href="/index.html">Home</a></li>
            <li><a href="/tentang.html">Tentang</a></li>
            <li><a href="/toko.html">Toko</a></li>
            <li><a href="/kontak.html" class="active">Kontak</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <!-- Combined Section: Contact & Footer -->
    <section id="kontak">
      <div class="container">
        <div class="contact-wrapper">
          <div class="contact-info">
            <h2>Hubungi Kami</h2>
            <p style="margin-bottom: 40px">Kunjungi outlet kami atau sampaikan pertanyaan Anda melalui formulir berikut.</p>
            <div class="info-item">
              <i data-lucide="map-pin" style="color: var(--primary)"></i>
              <span>Jl. Kopi Harapan No. 6, Jakarta Selatan</span>
            </div>
            <div class="info-item">
              <i data-lucide="phone" style="color: var(--primary)"></i>
              <span>+62 812 3456 7890</span>
            </div>
            <div class="info-item">
              <i data-lucide="mail" style="color: var(--primary)"></i>
              <span>hello@sixcoffee.com</span>
            </div>
          </div>

          <div class="contact-form">
            <form id="contactForm">
              <div style="margin-bottom: 15px">
                <input type="text" placeholder="Nama Lengkap" required style="width: 100%; padding: 12px; background: var(--dark); border: 1px solid #333; color: white; border-radius: 4px" />
              </div>
              <div style="margin-bottom: 15px">
                <input type="email" placeholder="Alamat Email" required style="width: 100%; padding: 12px; background: var(--dark); border: 1px solid #333; color: white; border-radius: 4px" />
              </div>
              <div style="margin-bottom: 15px">
                <textarea rows="4" placeholder="Pesan Anda" required style="width: 100%; padding: 12px; background: var(--dark); border: 1px solid #333; color: white; border-radius: 4px"></textarea>
              </div>
              <button type="submit" class="btn" style="width: 100%">Kirim Pesan</button>
            </form>
          </div>
        </div>

        <div class="footer-bottom">
          <span class="footer-logo">SIXCOFFEE</span>
          <div class="social-links">
            <a href="#" title="Instagram">
              <svg role="img" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M12 0C8.74 0 8.333.015 7.053.072 5.775.132 4.905.333 4.14.63c-.789.306-1.459.717-2.126 1.384S.935 3.35.63 4.14C.333 4.905.131 5.775.072 7.053.012 8.333 0 8.74 0 12s.012 3.667.072 4.947c.06 1.277.261 2.148.558 2.913.306.788.717 1.459 1.384 2.126.667.666 1.336 1.079 2.126 1.384.766.296 1.636.499 2.913.558C8.333 23.988 8.74 24 12 24s3.667-.012 4.947-.072c1.277-.06 2.148-.262 2.913-.558.788-.306 1.459-.718 2.126-1.384.666-.667 1.079-1.335 1.384-2.126.296-.765.499-1.636.558-2.913.06-1.28.072-1.687.072-4.947s-.012-3.667-.072-4.947c-.06-1.277-.262-2.149-.558-2.913-.306-.789-.718-1.459-1.384-2.126C21.319 1.347 20.651.935 19.86.63c-.765-.297-1.636-.499-2.913-.558C15.667.012 15.26 0 12 0zm0 2.16c3.203 0 3.585.016 4.85.071 1.17.055 1.805.249 2.227.415.562.217.96.477 1.382.896.419.42.679.819.896 1.381.164.422.36 1.057.413 2.227.057 1.266.07 1.646.07 4.85s-.015 3.585-.074 4.85c-.061 1.17-.256 1.805-.421 2.227-.224.562-.479.96-.899 1.382-.419.419-.824.679-1.38.896-.42.164-1.065.36-2.235.413-1.274.057-1.649.07-4.859.07-3.211 0-3.586-.015-4.859-.074-1.171-.061-1.816-.256-2.236-.421-.569-.224-.96-.479-1.379-.899-.421-.419-.69-.824-.9-1.38-.165-.42-.359-1.065-.42-2.235-.045-1.26-.061-1.649-.061-4.844 0-3.196.016-3.586.061-4.861.061-1.17.255-1.814.42-2.234.21-.57.479-.96.9-1.381.419-.419.81-.689 1.379-.898.42-.166 1.051-.361 2.221-.421 1.275-.045 1.65-.06 4.859-.06l.045.03zM12 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"
                />
              </svg>
            </a>
            <a href="#" title="Facebook">
              <svg role="img" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" /></svg>
            </a>
            <a href="#" title="X (Twitter)">
              <svg role="img" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18.901 1.153h3.68l-8.04 9.19L24 22.846h-7.406l-5.8-7.584-6.638 7.584H.474l8.6-9.83L0 1.154h7.594l5.243 6.932ZM17.61 20.644h2.039L6.486 3.24H4.298Z" /></svg>
            </a>
          </div>
          <p style="opacity: 0.5; font-size: 0.85rem">&copy; 2026 SIXCOFFEE - Kesatuan dalam Kualitas #SIXreactme</p>
        </div>
      </div>
    </section>

    <script>
      const App = {
        init: () => {
          lucide.createIcons();
          App.handleContact();
          App.handleMobileMenu();
        },

        handleMobileMenu: () => {
          const btn = document.getElementById("mobileBtn");
          const navLinks = document.getElementById("navLinks");
          const links = navLinks.querySelectorAll("a");

          const toggleMenu = () => {
            const isOpen = navLinks.classList.toggle("active");
            btn.innerHTML = isOpen ? '<i data-lucide="x"></i>' : '<i data-lucide="menu"></i>';
            lucide.createIcons();
            document.body.style.overflow = isOpen ? "hidden" : "auto";
          };

          btn.onclick = toggleMenu;

          links.forEach((link) => {
            link.onclick = () => {
              navLinks.classList.remove("active");
              btn.innerHTML = '<i data-lucide="menu"></i>';
              lucide.createIcons();
              document.body.style.overflow = "auto";
            };
          });
        },

        handleContact: () => {
          document.getElementById("contactForm").onsubmit = (e) => {
            e.preventDefault();
            alert("Terima kasih! Pesan Anda telah kami terima.");
            e.target.reset();
          };
        },
      };

      document.addEventListener("DOMContentLoaded", App.init);
    </script>
  </body>
</html>
