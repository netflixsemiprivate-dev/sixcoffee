<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIXCOFFEE - Kontak</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23c49b63'/><text x='50%' y='50%' dominant-baseline='central' text-anchor='middle' font-family='serif' font-size='60' fill='white' font-weight='bold'>6</text></svg>" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      :root {
        --primary: #c49b63;
        --dark: #121212;
        --darker: #0a0a0a;
        --light: #f4f4f4;
        --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: "Poppins", sans-serif; background-color: var(--dark); color: var(--light); line-height: 1.6; }
      h1, h2, h3 { font-family: "Playfair Display", serif; }
      .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

      header { position: fixed; top: 0; width: 100%; background: rgba(18, 18, 18, 0.85); backdrop-filter: blur(10px); z-index: 2000; padding: 20px 0; }
      nav { display: flex; justify-content: space-between; align-items: center; }
      .logo { font-size: 1.8rem; font-weight: bold; color: var(--primary); }
      .nav-links { display: flex; gap: 30px; list-style: none; }
      .nav-links a { text-decoration: none; color: var(--light); opacity: 0.7; }
      .nav-links a.active { color: var(--primary); opacity: 1; }

      section { min-height: 100vh; display: flex; align-items: center; padding: 100px 0; }
      .contact-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; width: 100%; }
      .contact-info h2 { font-size: 2.5rem; color: var(--primary); margin-bottom: 30px; }
      .info-item { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; }

      .contact-form { background: var(--darker); padding: 40px; border-radius: 12px; border: 1px solid rgba(196, 155, 99, 0.1); }
      input, textarea { width: 100%; padding: 12px; background: var(--dark); border: 1px solid #333; color: white; border-radius: 4px; margin-bottom: 15px; font-family: inherit; }
      .btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; transition: 0.3s; }
      .btn:hover { opacity: 0.8; }

      @media (max-width: 992px) { .contact-wrapper { grid-template-columns: 1fr; } .nav-links { display: none; } }
    </style>
  </head>
  <body>
    <header>
      <div class="container">
        <nav>
          <div class="logo">SIXCOFFEE</div>
          <ul class="nav-links">
            <li><a href="/index.html">Home</a></li>
            <li><a href="/tentang.html">Tentang</a></li>
            <li><a href="/toko.html">Toko</a></li>
            <li><a href="/kontak.html" class="active">Kontak</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <section id="kontak">
      <div class="container">
        <div class="contact-wrapper">
          <div class="contact-info">
            <h2>Hubungi Kami</h2>
            <p style="margin-bottom: 40px">Selesaikan pesanan Anda atau sampaikan pertanyaan Anda.</p>
            <div class="info-item">
              <i data-lucide="map-pin" style="color: var(--primary)"></i>
              <span>Jl. SixCoffee No. 48, Tambun Selatan</span>
            </div>
            <div class="info-item">
              <i data-lucide="phone" style="color: var(--primary)"></i>
              <span>+62 813 9800 7638</span>
            </div>
            <div class="info-item">
              <i data-lucide="mail" style="color: var(--primary)"></i>
              <span>hello@sixcoffee.com</span>
            </div>
          </div>

          <div class="contact-form">
            <form action="https://api.web3forms.com/submit" method="POST">
              <input type="hidden" name="access_key" value="f0ee1578-2a2a-4572-a49e-3fdff0c440b6">
              
              <input type="text" name="Nama" placeholder="Nama Lengkap" required />
              <input type="email" name="Email" placeholder="Alamat Email" required />
              <textarea name="Pesan" id="pesanOtomatis" rows="6" placeholder="Pesan Anda" required></textarea>
              
              <input type="hidden" name="redirect" value="https://sixcoffee.vercel.app/kontak.html">
              
              <button type="submit" class="btn">Kirim Pesan</button>
            </form>
          </div>
        </div>
      </div>
    </section>

    <script>
      window.onload = function() {
        const data = JSON.parse(localStorage.getItem('sixcoffee_cart'));
        if (data && data.length > 0) {
          // Menghitung jumlah per item (misal: Espresso Gold x2)
          const counts = {};
          data.forEach(item => { counts[item] = (counts[item] || 0) + 1; });
          
          let teks = "Halo SIXCOFFEE, saya mau pesan:\n";
          for (const coffee in counts) {
            teks += `- ${coffee} (${counts[coffee]}x)\n`;
          }
          teks += "\nMohon segera diproses ya!";
          
          document.getElementById('pesanOtomatis').value = teks;
          localStorage.removeItem('sixcoffee_cart'); // Clear cart setelah dipindah
        }
        lucide.createIcons();
      };
    </script>
  </body>
</html>
