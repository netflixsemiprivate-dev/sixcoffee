<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIXCOFFEE - Toko</title>
    <!-- SEO Meta Tags -->
    <meta name="description" content="SIXCOFFEE menyajikan pengalaman kopi premium dari biji pilihan petani lokal. Nikmati Espresso Gold, Vanilla Mist, dan Signature Arabica terbaik di Jakarta." />
    <meta name="keywords" content="SIXCOFFEE, kopi jakarta, cafe premium, espresso gold, biji kopi lokal, coffee shop jakarta selatan" />
    <meta name="author" content="SIXCOFFEE Team" />
    <!-- Favicon (SVG Data URI untuk SEO & Performa) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23c49b63'/><text x='50%' y='50%' dominant-baseline='central' text-anchor='middle' font-family='serif' font-size='60' fill='white' font-weight='bold'>6</text></svg>" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      :root {
        --primary: #c49b63;
        --dark: #121212;
        --darker: #0a0a0a;
        --light: #f4f4f4;
        --gray: #888;
        --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      /* Snap Scroll hanya untuk Desktop */
      @media (min-width: 993px) {
        html {
          scroll-snap-type: y mandatory;
        }
      }

      body {
        font-family: "Poppins", sans-serif;
        background-color: var(--dark);
        color: var(--light);
        line-height: 1.6;
        overflow-x: hidden;
      }

      h1,
      h2,
      h3 {
        font-family: "Playfair Display", serif;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
        width: 100%;
      }

      .btn {
        display: inline-block;
        padding: 12px 30px;
        background-color: var(--primary);
        color: white;
        border-radius: 4px;
        font-weight: 600;
        transition: var(--transition);
        border: 2px solid var(--primary);
        cursor: pointer;
        text-decoration: none;
        text-align: center;
      }

      .btn:hover {
        background-color: transparent;
        color: var(--primary);
      }

      /* Section Base */
      section {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        scroll-snap-align: start;
        position: relative;
        padding: 100px 0;
      }

      /* Navbar Section */
      header {
        position: fixed;
        top: 0;
        width: 100%;
        background: rgba(18, 18, 18, 0.85);
        backdrop-filter: blur(10px);
        z-index: 2000;
        padding: 20px 0;
        transition: var(--transition);
      }

      nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        font-family: "Playfair Display", serif;
        font-size: 1.8rem;
        font-weight: bold;
        letter-spacing: 2px;
        color: var(--primary);
        z-index: 2101;
      }

      .nav-links {
        display: flex;
        gap: 30px;
      }

      .nav-links a {
        text-decoration: none;
        color: var(--light);
        transition: var(--transition);
        font-weight: 400;
        opacity: 0.7;
      }

      .nav-links a:hover,
      .nav-links a.active {
        color: var(--primary);
        opacity: 1;
      }

      /* Mobile Menu Toggle */
      .mobile-toggle {
        display: none;
        cursor: pointer;
        color: var(--primary);
        z-index: 2101;
        padding: 5px;
      }

      /* Hero Section (Home) */
      #home {
        background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), url("https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=1950&q=80");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        text-align: center;
      }

      /* About Section (Tentang) */
      #tentang {
        background-color: var(--dark);
      }

      .about-content {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 60px;
        align-items: center;
      }

      .about-img {
        width: 100%;
        height: 450px;
        object-fit: cover;
        border-radius: 8px;
        box-shadow: 20px 20px 0px var(--primary);
        display: block;
      }

      .team-grid {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 15px;
        margin-top: 30px;
      }

      .team-member img {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        border: 2px solid var(--primary);
        margin-bottom: 8px;
        object-fit: cover;
      }

      /* Shop & Contact Sections */
      #toko {
        background-color: var(--darker);
      }
      #kontak {
        background-color: var(--dark);
      }

      .shop-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 25px;
      }

      .product-card {
        background: var(--dark);
        padding: 25px;
        border-radius: 12px;
        text-align: center;
        border: 1px solid rgba(196, 155, 99, 0.1);
      }

      .product-img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: 8px;
        margin-bottom: 15px;
      }

      /* Mobile Responsive */
      @media (max-width: 992px) {
        section {
          min-height: auto;
          padding: 100px 0;
          display: block;
        }
        .about-content {
          grid-template-columns: 1fr;
          gap: 40px;
        }
        .about-img {
          height: 300px;
          box-shadow: 10px 10px 0px var(--primary);
        }
        .team-grid {
          grid-template-columns: repeat(3, 1fr);
        }

        .mobile-toggle {
          display: block;
        }

        /* Nav Links Overlay - From Top */
        .nav-links {
          position: fixed;
          top: -110%; /* Hidden above */
          left: 0;
          width: 100%;
          height: 100vh;
          background: var(--darker);
          flex-direction: column;
          justify-content: center;
          align-items: center;
          gap: 40px;
          transition: var(--transition);
          z-index: 2100;
          visibility: hidden;
        }

        .nav-links.active {
          top: 0;
          visibility: visible;
        }

        .nav-links a {
          font-size: 2rem;
          font-family: "Playfair Display", serif;
        }

        .contact-wrapper {
          grid-template-columns: 1fr;
        }
      }

      footer {
        padding: 40px 0;
        text-align: center;
        background: var(--darker);
        border-top: 1px solid rgba(255, 255, 255, 0.05);
      }
    </style>
  </head>
  <body>
    <header id="navbar">
      <div class="container">
        <nav>
          <div class="logo">SIXCOFFEE</div>
          <!-- Tombol Toggle Mobile -->
          <div class="mobile-toggle" id="mobileBtn">
            <i data-lucide="menu"></i>
          </div>
          <!-- Navigasi -->
          <ul class="nav-links" id="navLinks">
            <li><a href="/index.html">Home</a></li>
            <li><a href="/tentang.html">Tentang</a></li>
            <li><a href="/toko.html" class="active">Toko</a></li>
            <li><a href="/kontak.html">Kontak</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <section id="toko">
      <div class="container">
        <h2 style="text-align: center; color: var(--primary); margin-bottom: 50px">Menu Pilihan</h2>
        <div class="shop-grid" id="product-list"></div>
      </div>
    </section>

    <script>
      const App = {
        init: () => {
          lucide.createIcons();
          App.renderProducts();
          App.handleMobileMenu();
        },

        renderProducts: () => {
          const data = [
            { name: "Espresso Gold", price: "Rp 35k", img: "https://images.unsplash.com/photo-1510591509098-f4fdc6d0ff04?w=500&q=80" },
            { name: "Vanilla Mist", price: "Rp 42k", img: "https://images.unsplash.com/photo-1559496417-e7f25cb247f3?w=500&q=80" },
            { name: "Signature Arabica", price: "Rp 44k", img: "https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=500&q=80" },
            { name: "Cloudy Macchiato", price: "Rp 45k", img: "https://images.unsplash.com/photo-1485808191679-5f86510681a2?w=500&q=80" },
          ];
          const grid = document.getElementById("product-list");
          grid.innerHTML = data
            .map(
              (item) => `
                    <div class="product-card">
                        <img src="${item.img}" class="product-img" alt="${item.name}">
                        <h3>${item.name}</h3>
                        <p style="color: var(--primary); font-weight: bold; margin: 10px 0;">${item.price}</p>
                        <button class="btn" style="padding: 5px 15px; font-size: 0.8rem;">Beli</button>
                    </div>
                `,
            )
            .join("");
        },

        handleMobileMenu: () => {
          const btn = document.getElementById("mobileBtn");
          const navLinks = document.getElementById("navLinks");
          const links = navLinks.querySelectorAll("a");

          const toggleMenu = () => {
            const isOpen = navLinks.classList.toggle("active");
            btn.innerHTML = isOpen ? '<i data-lucide="x"></i>' : '<i data-lucide="menu"></i>';
            lucide.createIcons();
            // Cegah scroll body saat menu terbuka
            document.body.style.overflow = isOpen ? "hidden" : "auto";
          };

          btn.onclick = toggleMenu;

          links.forEach((link) => {
            link.onclick = () => {
              navLinks.classList.remove("active");
              btn.innerHTML = '<i data-lucide="menu"></i>';
              lucide.createIcons();
              document.body.style.overflow = "auto";
            };
          });
        },
      };

      document.addEventListener("DOMContentLoaded", App.init);
    </script>
  </body>
</html>
