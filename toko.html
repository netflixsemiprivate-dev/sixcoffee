<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIXCOFFEE - Toko</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23c49b63'/><text x='50%' y='50%' dominant-baseline='central' text-anchor='middle' font-family='serif' font-size='60' fill='white' font-weight='bold'>6</text></svg>" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      :root {
        --primary: #c49b63;
        --dark: #121212;
        --darker: #0a0a0a;
        --light: #f4f4f4;
        --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: "Poppins", sans-serif; background-color: var(--dark); color: var(--light); line-height: 1.6; }
      h1, h2, h3 { font-family: "Playfair Display", serif; }
      .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

      header { position: fixed; top: 0; width: 100%; background: rgba(18, 18, 18, 0.85); backdrop-filter: blur(10px); z-index: 2000; padding: 20px 0; }
      nav { display: flex; justify-content: space-between; align-items: center; }
      .logo { font-size: 1.8rem; font-weight: bold; color: var(--primary); }
      .nav-links { display: flex; gap: 30px; list-style: none; }
      .nav-links a { text-decoration: none; color: var(--light); opacity: 0.7; }
      .nav-links a.active { color: var(--primary); opacity: 1; }

      #toko { padding: 120px 0 100px; background-color: var(--darker); min-height: 100vh; }
      
      .live-clock-wrapper { text-align: center; margin-bottom: 30px; }
      #timeDisplay {
        font-family: 'Poppins', sans-serif;
        font-size: 1.2rem;
        font-weight: 600;
        color: var(--primary);
        background: rgba(196, 155, 99, 0.1);
        padding: 8px 25px;
        border-radius: 50px;
        border: 1px solid rgba(196, 155, 99, 0.3);
        display: inline-block;
        letter-spacing: 2px;
      }

      .shop-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; margin-top: 20px; }
      .product-card { background: var(--dark); padding: 25px; border-radius: 12px; text-align: center; border: 1px solid rgba(196, 155, 99, 0.1); }
      .product-img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 15px; }
      
      .button-group { display: flex; gap: 10px; margin-top: 10px; }
      .btn { flex: 1; padding: 10px; background-color: var(--primary); color: white; border-radius: 4px; font-weight: 600; cursor: pointer; border: none; transition: 0.3s; }
      .btn-cancel { background-color: #2a2a2a; color: #ff4d4d; border: 1px solid #444; flex: 0.3; }
      .btn:hover { opacity: 0.8; }

      /* Floating Cart Update */
      .cart-notif { 
        position: fixed; 
        bottom: 30px; 
        left: 50%; 
        transform: translateX(-50%); 
        background: var(--primary); 
        color: white; 
        padding: 20px; 
        border-radius: 20px; 
        z-index: 3000; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        display: none; 
        width: 90%; 
        max-width: 400px;
        animation: slideUp 0.4s ease; 
      }
      
      #cartList {
        font-size: 0.9rem;
        margin-bottom: 15px;
        max-height: 120px;
        overflow-y: auto;
        border-bottom: 1px solid rgba(255,255,255,0.2);
        padding-bottom: 10px;
      }

      .checkout-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .btn-checkout {
        background: white;
        color: var(--primary);
        border: none;
        padding: 8px 20px;
        border-radius: 50px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
      }
      .btn-checkout:hover { background: var(--light); }

      @keyframes slideUp { from { bottom: -100px; } to { bottom: 30px; } }
      @media (max-width: 992px) { .nav-links { display: none; } }
    </style>
  </head>
  <body>
    <header>
      <div class="container">
        <nav>
          <div class="logo">SIXCOFFEE</div>
          <ul class="nav-links">
            <li><a href="/index.html">Home</a></li>
            <li><a href="/tentang.html">Tentang</a></li>
            <li><a href="/toko.html" class="active">Toko</a></li>
            <li><a href="/kontak.html">Kontak</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <section id="toko">
      <div class="container">
        <h2 style="text-align: center; color: var(--primary); margin-bottom: 10px;">Menu Pilihan</h2>
        <div class="live-clock-wrapper">
          <div id="timeDisplay">00:00:00</div>
        </div>
        <div class="shop-grid" id="product-list"></div>
      </div>
    </section>

    <div id="cartStatus" class="cart-notif">
      <div id="cartList"></div>
      <div class="checkout-row">
        <span>Total: <strong id="cartCount">0</strong> Pesanan</span>
        <button class="btn-checkout" onclick="goToCheckout()">Checkout Sekarang</button>
      </div>
    </div>

    <script>
      let keranjang = [];

      function startLiveClock() {
        const display = document.getElementById("timeDisplay");
        function update() {
          const now = new Date();
          let h = String(now.getHours()).padStart(2, '0');
          let m = String(now.getMinutes()).padStart(2, '0');
          let s = String(now.getSeconds()).padStart(2, '0');
          display.innerText = `${h}:${m}:${s}`;
        }
        setInterval(update, 1000);
        update();
      }

      function renderProducts() {
        const data = [
          { name: "Espresso Gold", price: 35000, img: "https://images.unsplash.com/photo-1510591509098-f4fdc6d0ff04?w=500&q=80" },
          { name: "Vanilla Mist", price: 42000, img: "https://images.unsplash.com/photo-1559496417-e7f25cb247f3?w=500&q=80" },
          { name: "Signature Arabica", price: 44000, img: "https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=500&q=80" },
          { name: "Cloudy Macchiato", price: 45000, img: "https://images.unsplash.com/photo-1485808191679-5f86510681a2?w=500&q=80" },
        ];
        const grid = document.getElementById("product-list");
        grid.innerHTML = data.map(item => `
          <div class="product-card">
            <img src="${item.img}" class="product-img" alt="${item.name}">
            <h3>${item.name}</h3>
            <p style="color: var(--primary); font-weight: bold; margin: 10px 0;">Rp ${item.price.toLocaleString('id-ID')}</p>
            <div class="button-group">
              <button class="btn" onclick="tambahKeKeranjang('${item.name}', ${item.price})">Beli</button>
              <button class="btn btn-cancel" onclick="hapusSatuDariKeranjang('${item.name}')">X</button>
            </div>
          </div>
        `).join("");
      }

      function tambahKeKeranjang(nama, harga) {
        keranjang.push({ nama: nama, harga: harga });
        updateUI();
      }

      function hapusSatuDariKeranjang(nama) {
        const index = keranjang.map(e => e.nama).lastIndexOf(nama);
        if (index > -1) {
          keranjang.splice(index, 1);
        }
        updateUI();
      }

      function updateUI() {
        localStorage.setItem('sixcoffee_cart', JSON.stringify(keranjang));
        const status = document.getElementById('cartStatus');
        const count = document.getElementById('cartCount');
        const listContainer = document.getElementById('cartList');
        
        if (keranjang.length > 0) {
          status.style.display = 'block';
          count.innerText = keranjang.length;

          // Kelompokkan produk agar rapi (Contoh: Espresso 2x)
          const ringkasan = {};
          keranjang.forEach(item => {
            ringkasan[item.nama] = (ringkasan[item.nama] || 0) + 1;
          });

          // Tampilkan teks nama produk
          listContainer.innerHTML = Object.keys(ringkasan).map(nama => 
            `<div style="display:flex; justify-content:space-between; margin-bottom:4px;">
              <span>${nama}</span>
              <span>x${ringkasan[nama]}</span>
            </div>`
          ).join("");

        } else {
          status.style.display = 'none';
        }
      }

      function goToCheckout() {
        window.location.href = "kontak.html";
      }

      document.addEventListener("DOMContentLoaded", () => {
        localStorage.removeItem('sixcoffee_cart'); 
        startLiveClock();
        renderProducts();
        lucide.createIcons();
      });
    </script>
  </body>
</html>
